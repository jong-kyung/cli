        mechanism: 'Legacy alias outputs may not match current CLI discovery behavior; ids and formats differ.'
        wrong_pattern: |
          npx create-tsrouter-app --list-add-ons
        correct_pattern: |
          npx @tanstack/cli create --list-add-ons --json
        source: 'https://github.com/TanStack/cli/issues/93'
        priority: MEDIUM
        status: fixed-but-legacy-risk
        version_context: 'Agents trained on older examples may still generate the create-tsrouter-app pattern.'
        skills: ['query-docs-library-metadata']

      - mistake: 'Treat --list-add-ons --json output as a wrapped object with count key'
        mechanism: 'Output is a flat JSON array, not an object with a count/addOns wrapper; destructuring the wrong shape silently yields undefined.'
        wrong_pattern: |
