        status: active
        skills: ['maintain-custom-addons-dev-watch']

      - mistake: 'Pass --no-install to dev-watch create'
        mechanism: 'Dev-watch validates options and rejects --no-install; the loop fails before first sync.'
        wrong_pattern: |
          npx @tanstack/cli create my-sandbox --dev-watch ../my-framework-dir --no-install
        correct_pattern: |
          npx @tanstack/cli create my-sandbox --dev-watch ../my-framework-dir
        source: 'packages/cli/src/dev-watch.ts'
        priority: HIGH
        status: active
        skills: ['maintain-custom-addons-dev-watch']

      - mistake: 'Point --dev-watch at a path without framework structure'
        mechanism: 'validateDevWatchOptions checks for add-ons/, assets/, or framework.json; paths missing all three fail validation before sync.'
        wrong_pattern: |
          npx @tanstack/cli create my-sandbox --dev-watch ../arbitrary-dir
        correct_pattern: |
          npx @tanstack/cli create my-sandbox --dev-watch ../path/with/add-ons-or-assets
        source: 'packages/cli/src/command-line.ts:599'
        priority: HIGH
        status: active
        skills: ['maintain-custom-addons-dev-watch']

      - mistake: 'Run add-on workflows without .cta.json in working directory'
        mechanism: 'add-on init/compile/dev read persisted scaffold options from .cta.json; missing config blocks the entire workflow.'
        wrong_pattern: |
          # In a project not scaffolded by tanstack create:
          npx @tanstack/cli add-on dev
        correct_pattern: |
          # In a project with .cta.json (created via tanstack create):
          npx @tanstack/cli add-on dev
