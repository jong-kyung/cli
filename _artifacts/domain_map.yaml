    tasks:
      - 'Initialize a custom add-on from an existing project'
      - 'Compile add-on assets into a distributable add-on.json'
      - 'Run a live dev loop while authoring add-on source'
      - 'Sync a framework directory into a sandbox app for rapid testing'
      - 'Publish and load a remote add-on via URL'
    failure_modes:
      - mistake: 'Run add-on init from a code-router project'
