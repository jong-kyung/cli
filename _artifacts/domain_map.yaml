tensions:
  - name: 'Compatibility mode vs explicit intent'
    skills: ['create-app-scaffold', 'choose-ecosystem-integrations']
    description: '--router-only silently strips add-on, deployment, and template flags that were explicitly requested.'
    implication: 'An agent optimizing for a working scaffold command will produce --router-only combinations that silently drop integration intent.'

  - name: 'Single-command convenience vs integration precision'
    skills: ['create-app-scaffold', 'query-docs-library-metadata', 'choose-ecosystem-integrations']
    description: 'One-shot scaffold commands skip the discovery step needed to validate add-on ids, option defaults, and exclusivity constraints.'
    implication: 'An agent skipping discovery runs tanstack create with plausible-sounding ids that may be wrong, defaulted incorrectly, or mutually exclusive.'

  - name: 'Automation portability vs scaffold metadata dependency'
    skills: ['add-addons-existing-app', 'maintain-custom-addons-dev-watch']
    description: 'Both tanstack add and add-on workflows depend on .cta.json, making them non-portable to projects not created by this CLI.'
    implication: 'An agent that treats these as general-purpose commands will apply them to arbitrary projects and fail silently or with cryptic errors.'

