      - 'tanstack create --addon-details --json'
      - 'tanstack ecosystem --json'
    tasks:
      - 'Resolve valid library ids before fetching docs'
      - 'Fetch a specific documentation page for code generation context'
      - 'Search docs for the right guide before implementing a feature'
      - 'Enumerate available add-ons for an agent planning integrations'
    reference_candidates:
      - topic: 'JSON output shapes for all discovery commands'
        reason: 'Each command has a distinct schema; agents must parse correctly to extract ids, versions, and option surfaces'
    failure_modes:
      - mistake: 'Use --library / --version flags on tanstack doc'
        mechanism: '`doc` takes positional args (<library> <path>), not --library/--version flags; wrong invocation fails with unknown option error.'
        wrong_pattern: |
          npx @tanstack/cli doc --library router --version latest --path /docs/framework/react/guide/routing
        correct_pattern: |
          npx @tanstack/cli doc router framework/react/guide/routing
          npx @tanstack/cli doc router framework/react/guide/routing --docs-version latest
        source: 'packages/cli/src/cli.ts:727'
        priority: HIGH
        status: active
        skills: ['query-docs-library-metadata']

      - mistake: 'Include /docs/ prefix in the doc path argument'
        mechanism: 'Path argument is appended directly to the docs root; including /docs/ produces a 404-equivalent not-found error.'
        wrong_pattern: |
          npx @tanstack/cli doc router /docs/framework/react/guide/routing
        correct_pattern: |
          npx @tanstack/cli doc router framework/react/guide/routing
        source: 'packages/cli/src/cli.ts:765'
        priority: MEDIUM
