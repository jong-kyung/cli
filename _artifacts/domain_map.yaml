skills:
  - name: 'Create App Scaffold'
    slug: 'create-app-scaffold'
    domain: 'scaffolding'
    description: 'Build a deterministic tanstack create command — choosing mode, framework, toolchain, deployment, and add-ons with correct flag combinations.'
    type: core
    packages:
      - '@tanstack/cli'
    covers:
      - 'tanstack create'
      - '--framework'
      - '--toolchain'
      - '--deployment'
      - '--add-ons'
      - '--router-only'
      - '--template / --starter'
      - '--no-install / --no-git'
      - '-y (non-interactive)'
      - 'validateLegacyCreateFlags'
      - 'normalizeOptions'
    tasks:
      - 'Scaffold a new TanStack Start app with specific integrations'
      - 'Scaffold a router-only SPA without SSR'
      - 'Scaffold with a custom or registry template'
      - 'Run scaffold non-interactively in CI'
    failure_modes:
      - mistake: 'Pass --add-ons without explicit ids in non-interactive mode'
        mechanism: 'Empty --add-ons flag resolves to interactive mode or defaults, silently missing intended integrations.'
        wrong_pattern: |
          npx @tanstack/cli create my-app --add-ons -y
        correct_pattern: |
          npx @tanstack/cli create my-app --add-ons clerk,drizzle -y
        source: 'https://github.com/TanStack/cli/issues/234'
        priority: HIGH
        status: fixed-but-legacy-risk
        version_context: 'Fixed in newer versions; agents trained on older examples still generate this.'
        skills: ['create-app-scaffold']

      - mistake: 'Use deprecated --no-tailwind expecting opt-out to work'
        mechanism: 'Flag is deprecated and silently ignored; output always includes Tailwind regardless.'
        wrong_pattern: |
          npx @tanstack/cli create my-app --no-tailwind -y
        correct_pattern: |
          npx @tanstack/cli create my-app -y
          # Remove Tailwind manually post-scaffold if needed
        source: 'packages/cli/src/command-line.ts:369'
        priority: HIGH
        status: active
        skills: ['create-app-scaffold']

      - mistake: 'Combine --router-only with add-ons, deployment, or template'
        mechanism: 'Router-only mode ignores --add-ons, --deployment, --template, and --template-id; command succeeds but produces wrong scaffold.'
        wrong_pattern: |
          npx @tanstack/cli create my-app \
            --router-only \
            --template some-template \
            --deployment cloudflare \
            --add-ons clerk \
            -y
        correct_pattern: |
          npx @tanstack/cli create my-app --router-only --framework react -y
        source: 'packages/cli/src/command-line.ts:343'
        priority: CRITICAL
        status: active
        skills: ['create-app-scaffold', 'choose-ecosystem-integrations']

      - mistake: 'Use JavaScript/JSX template value'
        mechanism: 'Templates javascript/js/jsx are explicitly rejected with an error; TanStack Start is TypeScript-only.'
        wrong_pattern: |
          npx @tanstack/cli create my-app --template javascript -y
        correct_pattern: |
          npx @tanstack/cli create my-app -y
        source: 'packages/cli/src/command-line.ts:381'
        priority: HIGH
        status: active
        skills: ['create-app-scaffold']

  - name: 'Choose Ecosystem Integrations'
    slug: 'choose-ecosystem-integrations'
    domain: 'integrations'
    description: 'Map user requirements to valid add-on ids using ecosystem and list-add-ons discovery, then compose them correctly respecting exclusive categories and dependency chains.'
    type: composition
    packages:
      - '@tanstack/cli'
    covers:
      - 'tanstack ecosystem --json'
      - 'tanstack create --list-add-ons --json'
      - 'tanstack create --addon-details --json'
      - 'exclusive category constraints'
      - 'dependsOn resolution'
      - 'add-on options / --add-on-config'
    tasks:
      - 'Select auth, database, ORM, and deployment add-ons without conflicts'
      - 'Inspect per-add-on configuration options before choosing'
      - 'Map an ecosystem partner name to its installable add-on id'
      - 'Avoid selecting two add-ons from the same exclusive category'
    failure_modes:
      - mistake: 'Use ecosystem partner id directly as add-on id'
        mechanism: 'Ecosystem partner ids and add-on ids are independent namespaces; partner ids can fail or match the wrong add-on.'
        wrong_pattern: |
          npx @tanstack/cli add <partner-id-from-ecosystem-json>
        correct_pattern: |
          npx @tanstack/cli ecosystem --json
          npx @tanstack/cli create --list-add-ons --json
          # Match partner to add-on id manually, then:
          npx @tanstack/cli add <mapped-addon-id>
        source: 'packages/cli/src/cli.ts — ecosystem vs list-add-ons output comparison'
        priority: HIGH
        status: active
        skills: ['choose-ecosystem-integrations', 'add-addons-existing-app']

      - mistake: 'Skip --addon-details before choosing a configurable provider'
        mechanism: 'Optionized providers silently default (e.g. Prisma defaults to postgres); wrong default locks in the wrong data-layer stack.'
        wrong_pattern: |
          npx @tanstack/cli create my-app --add-ons prisma -y
        correct_pattern: |
          npx @tanstack/cli create --addon-details prisma --json
          npx @tanstack/cli create my-app --add-ons prisma --add-on-config '{"prisma":{"provider":"sqlite"}}' -y
        source: 'packages/create/src/frameworks/react/add-ons/prisma/info.json'
        priority: HIGH
        status: active
        skills: ['choose-ecosystem-integrations']

      - mistake: 'Select multiple add-ons from the same exclusive category'
        mechanism: 'Exclusive categories (orm, auth, deploy, database, linter) permit only one active choice; multi-select drops or replaces intended providers silently.'
        wrong_pattern: |
          npx @tanstack/cli create my-app --add-ons clerk,workos -y
        correct_pattern: |
          npx @tanstack/cli create my-app --add-ons clerk -y
        source: 'packages/create/src/types.ts — AddOnBaseSchema.exclusive'
        priority: HIGH
        status: active
        skills: ['choose-ecosystem-integrations']

      - mistake: 'Assume --router-only supports deployment integration'
        mechanism: 'Router-only mode ignores --deployment; command succeeds without applying intended deployment target.'
        wrong_pattern: |
          npx @tanstack/cli create my-app --router-only --deployment cloudflare -y
        correct_pattern: |
          npx @tanstack/cli create my-app --router-only -y
        source: 'packages/cli/src/command-line.ts:349'
        priority: CRITICAL
        status: active
        skills: ['choose-ecosystem-integrations', 'create-app-scaffold']

