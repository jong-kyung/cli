  - name: 'Query Docs And Library Metadata'
    slug: 'query-docs-library-metadata'
    domain: 'discovery'
    description: 'Retrieve authoritative machine-readable context — library ids, add-on lists, doc pages, and search results — for preflight validation before code generation or integration selection.'
    type: core
    packages:
      - '@tanstack/cli'
    covers:
      - 'tanstack libraries --json'
