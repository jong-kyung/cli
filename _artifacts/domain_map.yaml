      - mistake: 'Use --dev-watch on the `dev` subcommand instead of `create`'
        mechanism: '`--dev-watch` is a flag on `tanstack create`, not on `tanstack dev`; using it on `dev` fails with unknown option.'
        wrong_pattern: |
          npx @tanstack/cli dev --dev-watch ../my-framework-dir
