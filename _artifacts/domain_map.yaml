          # Parsing as a flat array:
          const addOns = JSON.parse(output)
        source: 'packages/cli/src/cli.ts:268'
        priority: HIGH
        status: active
        skills: ['query-docs-library-metadata']

  - name: 'Maintain Custom Add-ons In Dev Watch'
